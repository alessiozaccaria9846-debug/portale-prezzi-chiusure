<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CupSolidale - Dashboard Partner</title>
  <style>
    :root {
      --teal: #7aa8a4;
      --teal-dark: #5f8f8b;
      --orange: #f97316;
      --orange-soft: #fb923c; 
      --green: #0d9488;
      --red: #ef4444;
      --dark-gray: #475569; /* Colore per weekend chiuso */
      --gray-bg: #f9fafb;
      --border: #e5e7eb;
      --text: #1f2937;
      --muted: #6b7280;
      --weekend-bg: #475569;
      --select: #93c5fd;
      --hover-bg: #f3f4f6;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: white; color: var(--text); overflow-x: hidden; }
    
    /* Barra di Navigazione */
    .topbar { display:flex; align-items:center; gap:16px; padding:8px 16px; border-bottom:1px solid var(--border); background:white; position:sticky; top:0; z-index:100; height: 56px; }
    .logo { width:28px; height:28px; color:#22c55e; flex-shrink: 0; }
    
    .dropdown { position:relative; }
    .dropdown select { appearance:none; padding:8px 32px 8px 12px; border:1px solid var(--border); border-radius:8px; background:white; font-size:14px; min-width:240px; cursor: pointer; outline: none; }
    .dropdown::after { content:"▾"; position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
    
    nav { display:flex; gap:4px; }
    nav a { padding:8px 14px; border-radius:6px; text-decoration:none; color:var(--muted); font-size:14px; transition: all 0.2s ease; }
    nav a:hover { background: var(--hover-bg); color: var(--teal-dark); }
    nav a.active { background:#f3f4f6; color:var(--text); font-weight:600; }
    
    .spacer { flex:1; }
    .logout { padding:6px 16px; border:1px solid var(--border); border-radius:8px; background:white; cursor:pointer; font-size:14px; }

    .page { display:none; min-height: calc(100vh - 56px); }
    .page.active { display:block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* --- Chat Homepage --- */
    .home-chat-card { width:100%; max-width:760px; background:white; border:1px solid var(--border); border-radius:16px; box-shadow:0 12px 32px rgba(0,0,0,0.08); overflow:hidden; display: flex; flex-direction: column; }
    .home-chat-header { background:var(--teal); color:white; padding:20px 28px; font-weight:600; font-size:20px; display: flex; justify-content: space-between; align-items: center; }
    .home-chat-messages { padding:28px; height:400px; overflow-y:auto; background:#f9fafb; font-size:15px; display: flex; flex-direction: column; gap: 16px; }
    
    .msg { display: flex; width: 100%; }
    .msg.bot { justify-content: flex-start; }
    .msg.user { justify-content: flex-end; }
    .bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 14.5px; }
    .bot .bubble { background: white; color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .user .bubble { background: var(--teal); color: white; border-bottom-right-radius: 4px; }

    .home-quick-actions { padding: 12px 28px; background: white; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px; }
    .home-quick-actions button { padding:8px 14px; border:1px solid #e5e7eb; border-radius:20px; background:white; cursor:pointer; font-size:13px; transition: all 0.2s; }
    .home-quick-actions button:hover { background: var(--teal); color: white; border-color: var(--teal); }

    .home-chat-input-area { display:flex; border-top:1px solid var(--border); background:white; }
    .home-chat-input-area input { flex:1; border:none; padding:20px 24px; font-size:15px; outline:none; }
    .home-chat-input-area button { background:var(--teal); color:white; border:none; padding:0 30px; cursor:pointer; font-weight:600; }

    /* --- Spotlight Tutorial --- */
    #spotlight-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9998; display: none; transition: clip-path 0.3s ease-out; }
    #tutorial-card { position: fixed; z-index: 9999; background: white; padding: 24px; border-radius: 16px; width: 340px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: none; flex-direction: column; gap: 16px; border: 2px solid var(--teal); transition: top 0.3s ease, left 0.3s ease; }
    .tutorial-card-header { font-size: 18px; font-weight: 700; color: var(--teal-dark); }
    .tutorial-card-body { font-size: 14px; line-height: 1.6; color: var(--text); }
    .tutorial-card-footer { display: flex; justify-content: flex-end; gap: 10px; }
    .btn-tour-skip { background: white; color: var(--muted); border: 1px solid var(--border); padding: 8px 16px; border-radius: 10px; font-size: 13px; cursor: pointer; }
    .btn-tour-next { background: var(--teal); color: white; border: none; padding: 8px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }

    /* --- Table Prezzi --- */
    .table-container { overflow-x: auto; width: 100%; background: white; }
    table { width:100%; border-collapse:collapse; font-size:13px; min-width: 900px; }
    thead th { text-align:left; padding:16px; background:#f8fafc; border-bottom:2px solid var(--border); font-weight:700; color:#475569; position:sticky; top: 0; z-index:10; }
    tbody td { padding:12px 16px; border-bottom:1px solid #f1f5f9; }
    
    .price-input-container { display: flex; justify-content: flex-end; align-items: center; gap: 6px; }
    .price-edit-field { width: 80px; padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-weight: 700; text-align: right; font-size: 14px; outline: none; transition: all 0.2s; }
    .price-edit-field:focus { border-color: var(--teal); box-shadow: 0 0 0 2px rgba(122, 168, 164, 0.2); }

    .status-good { color: var(--green); background: #f0fdf4; border-color: #bbf7d0; }
    .status-medium { color: var(--orange); background: #fff7ed; border-color: #fed7aa; }
    .status-high { color: var(--red); background: #fef2f2; border-color: #fecaca; }
    
    /* Bottone Guida */
    .btn-start-tour { background: var(--orange-soft); color: white; border: none; padding: 10px 24px; border-radius: 30px; font-size: 14px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(251, 146, 60, 0.3); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); animation: pulse-glow 2.5s infinite; display: flex; align-items: center; gap: 8px; }
    .btn-start-tour:hover { transform: scale(1.05); background: #f97316; }
    @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(251, 146, 60, 0.5); } 70% { box-shadow: 0 0 0 10px rgba(251, 146, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(251, 146, 60, 0); } }

    /* --- Calendario --- */
    .calendar-wrap { padding:24px; overflow-x:auto; background: #f1f5f9; height: calc(100vh - 132px); position: relative; }
    .calendar { border:1px solid var(--border); border-radius:12px; overflow:hidden; min-width:1150px; background: #fff; }
    .cal-header, .cal-row { display:grid; grid-template-columns:160px repeat(31, 1fr); }
    .cal-header div { background:#f8fafc; padding:12px 4px; text-align:center; font-size:11px; font-weight: 700; border-right:1px solid var(--border); }
    .cal-row { border-top:1px solid var(--border); }
    .cal-row .month { padding:10px 16px; font-size:14px; font-weight:700; background:#fff; border-right:2px solid var(--teal); }
    
    .day { 
      height:48px; 
      display:flex; 
      align-items:center; 
      justify-content:center; 
      font-size:12px; 
      border-right:1px solid #f1f5f9; 
      background:white; 
      cursor:pointer; 
      position: relative;
    }
    
    /* Giorno Chiuso (Manuale) */
    .day.closed { background: var(--red) !important; color: white; }
    
    /* Giorno Chiuso (Weekend) */
    .day.weekend-closed { background: var(--dark-gray) !important; color: white; }
    
    /* Selezione per modifica */
    .day.selected { background: var(--select) !important; border: 2px solid #3b82f6; color: var(--text); }
    
    .day.empty { background: #f1f5f9; cursor: default; }
    .day:not(.empty):hover { filter: brightness(0.95); z-index: 5; }

    /* Tooltip */
    .day-tooltip {
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 50;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .day-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: #1e293b; }
    .day:hover .day-tooltip { opacity: 1; }

    .toast { position:fixed; bottom:30px; left: 50%; transform: translateX(-50%) translateY(100px); background:#1e293b; color:white; padding:12px 24px; border-radius:8px; transition:all 0.3s; z-index:10000; font-size: 14px; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .btn-save { background: var(--teal); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; }
  </style>
</head>
<body>

  <div id="spotlight-overlay"></div>
  <div id="tutorial-card">
    <div class="tutorial-card-header" id="tour-title"></div>
    <div class="tutorial-card-body" id="tour-desc"></div>
    <div class="tutorial-card-footer">
      <button class="btn-tour-skip" onclick="stopTour()">Chiudi</button>
      <button class="btn-tour-next" id="tour-next-btn" onclick="nextStep()">Avanti</button>
    </div>
  </div>

  <div class="topbar">
    <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
      <path d="M12 2v4M12 18v4M4 12H2M22 12h-2M7 7l-2-2M19 19l-2-2M7 17l-2 2M19 5l-2 2"/>
      <rect x="7" y="7" width="10" height="10" rx="2" />
    </svg>
    <div class="dropdown" id="step-partner">
      <select id="partnerSelect" onchange="updatePartnerInUI()">
        <option>Sede Principale - Milano Duomo</option>
        <option>Sede Secondaria - Roma Centro</option>
        <option>Sede Nord - Torino</option>
      </select>
    </div>
    <nav id="step-nav">
      <a href="#" data-page="home" class="active">Home</a>
      <a href="#" data-page="prezzi" id="step-link-prezzi">Listino Prezzi</a>
      <a href="#" data-page="chiusure" id="step-link-chiusure">Calendario Chiusure</a>
    </nav>
    <div class="spacer"></div>
    <button class="logout" onclick="location.reload()">Disconnetti</button>
  </div>

  <div id="page-home" class="page active">
    <div style="display:flex; justify-content:center; align-items:center; padding:40px 20px; background:#f1f5f9; min-height: calc(100vh - 56px);">
      <div class="home-chat-card">
        <div class="home-chat-header">
          <span>💬 Assistente Partner</span>
          <button class="btn-start-tour" onclick="startTour()">✨ AVVIA TOUR GUIDATO</button>
        </div>
        <div id="homeChatMessages" class="home-chat-messages">
          <div class="msg bot"><div class="bubble">Bentornato! Sono qui per aiutarti a gestire la tua struttura.<br><br>Usa i pulsanti qui sotto o scrivimi direttamente.</div></div>
        </div>
        <!-- Pulsanti Ripristinati -->
        <div class="home-quick-actions" id="quickButtons">
          <button onclick="homeQuickAction('Come modifico i prezzi?')">💰 Gestione Prezzi</button>
          <button onclick="homeQuickAction('Cosa significano i colori?')">🎨 Legenda Colori</button>
          <button onclick="homeQuickAction('Come imposto le chiusure?')">📅 Chiusure</button>
          <button onclick="homeQuickAction('Supporto')">📞 Supporto</button>
        </div>
        <div class="home-chat-input-area" id="step-chat">
          <input id="homeChatInput" type="text" placeholder="Chiedi pure aiuto...">
          <button id="homeChatSend">Invia</button>
        </div>
      </div>
    </div>
  </div>

  <div id="page-prezzi" class="page">
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Sede</th>
            <th>Specialista</th>
            <th>Cod. Prest.</th>
            <th>Descrizione Interna</th>
            <th>Nomenclatore CUP</th>
            <th id="step-header-prezzo" style="text-align: right;">Tariffa (€)</th>
          </tr>
        </thead>
        <tbody id="prezziBody"></tbody>
      </table>
    </div>
  </div>

  <div id="page-chiusure" class="page">
    <div style="display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); background: white;">
      <div id="step-titolo-chiusure" style="font-size:22px; font-weight:800; color: var(--teal-dark);">Calendario 2026</div>
      <div style="display: flex; gap: 12px; align-items: center;">
        <span style="font-size: 13px; color: var(--muted);" id="selectionSummary">Nessun giorno selezionato</span>
        <button id="step-btn-conferma" class="btn-save" onclick="saveChiusure()">Conferma</button>
      </div>
    </div>
    <div class="calendar-wrap">
      <div class="calendar" id="calendar"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const state = {
      currentPage: 'home',
      closedDays: new Set(['2026-01-01', '2026-04-25', '2026-05-01', '2026-06-02', '2026-08-15']),
      selectedDays: new Set(),
      prezziData: [
        { medico:'Dr.ssa Antonia Russo', idPrest:'P_775', prestAz:'Visita chirurgica mano', prestCup:'Visita Chirurgia della Mano', prezzo:140 },
        { medico:'Dr. Luca Rapparini', idPrest:'P_911', prestAz:'Visita Dermatologica', prestCup:'Visita Dermatologica', prezzo:135 },
        { medico:'Dr. Andrea Soldati', idPrest:'P_006', prestAz:'Ecografia Spalla', prestCup:'Ecografia Spalla', prezzo:85 },
        { medico:'Dr.ssa M. Rita Sabbatini', idPrest:'P_005', prestAz:'Visita Cardiologica', prestCup:'Visita Cardiologica', prezzo:175 }
      ],
      tourStep: 0
    };

    function isWeekend(date) { return date.getDay() === 0 || date.getDay() === 6; }

    function updatePartnerInUI() { if(state.currentPage === 'prezzi') renderPrezzi(); }

    function showPage(pageId) {
      document.querySelectorAll('nav a').forEach(x => x.classList.toggle('active', x.dataset.page === pageId));
      document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === `page-${pageId}`));
      state.currentPage = pageId;
      if(pageId === 'prezzi') renderPrezzi();
      if(pageId === 'chiusure') { state.selectedDays.clear(); renderCalendar(); }
    }

    document.querySelectorAll('nav a').forEach(a => { a.onclick = (e) => { e.preventDefault(); showPage(a.dataset.page); }; });

    // --- Logica Chat ---
    function appendMsg(container, text, type) {
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      div.innerHTML = `<div class="bubble">${text}</div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function sendHomeMessage() {
      const input = document.getElementById('homeChatInput');
      const val = input.value.trim();
      if (!val) return;
      
      appendMsg(document.getElementById('homeChatMessages'), val, 'user');
      input.value = '';
      
      setTimeout(() => {
        let resp = "Siamo a tua disposizione. Puoi contattarci allo 055 0982184 o scrivere a comunicazioni@cup24.it";
        const query = val.toLowerCase();
        
        if (query.includes('prezz') || query.includes('modific')) {
          resp = "Per modificare i prezzi, vai nella sezione <b>Listino Prezzi</b> e digita il nuovo importo direttamente nella colonna delle tariffe.";
        } else if (query.includes('color') || query.includes('legenda')) {
          resp = "I colori indicano la competitività:<br>🟢 <b>Verde</b>: Ottima tariffa<br>🟠 <b>Arancio</b>: Media mercato<br>🔴 <b>Rosso</b>: Fuori mercato";
        } else if (query.includes('chiusur') || query.includes('calendario') || query.includes('blocca')) {
          resp = "Nella sezione <b>Calendario Chiusure</b> puoi selezionare i giorni e cliccare su 'Conferma' per bloccare le prenotazioni.";
        } else if (query.includes('supporto') || query.includes('aiuto') || query.includes('contatt')) {
          resp = "Puoi contattarci allo <b>055 0982184</b> o scrivere a <b>comunicazioni@cup24.it</b>.";
        }
        
        appendMsg(document.getElementById('homeChatMessages'), resp, 'bot');
      }, 700);
    }
    
    document.getElementById('homeChatSend').onclick = sendHomeMessage;
    document.getElementById('homeChatInput').onkeypress = (e) => { if(e.key==='Enter') sendHomeMessage(); };
    
    function homeQuickAction(cmd) { 
      document.getElementById('homeChatInput').value = cmd; 
      sendHomeMessage(); 
    }

    // --- Tour ---
    const tourSteps = [
      { elementId: 'step-partner', title: 'Selezione Sede', desc: 'Scegli la sede da gestire.', page: 'home' },
      { elementId: 'step-chat', title: 'Assistente', desc: 'Chiedi aiuto qui.', page: 'home' },
      { elementId: 'step-link-prezzi', title: 'Navigazione', desc: 'Passa alle sezioni operative.', page: 'home' },
      { elementId: 'step-header-prezzo', title: 'Edita Tariffe', desc: 'Clicca e modifica i prezzi direttamente.', page: 'prezzi' },
      { elementId: 'step-titolo-chiusure', title: 'Calendario Chiusure', desc: 'I giorni in rosso e grigio scuro sono chiusi. Passa il mouse per i dettagli.', page: 'chiusure' }
    ];

    function startTour() { state.tourStep = 0; document.getElementById('spotlight-overlay').style.display = 'block'; document.getElementById('tutorial-card').style.display = 'flex'; updateTourStep(); }
    function stopTour() { document.getElementById('spotlight-overlay').style.display = 'none'; document.getElementById('tutorial-card').style.display = 'none'; }
    function nextStep() { state.tourStep++; if (state.tourStep >= tourSteps.length) { showToast("Tour finito!"); stopTour(); } else updateTourStep(); }

    function updateTourStep() {
      const step = tourSteps[state.tourStep];
      if (state.currentPage !== step.page) showPage(step.page);
      setTimeout(() => {
        const el = document.getElementById(step.elementId);
        const rect = el.getBoundingClientRect();
        const card = document.getElementById('tutorial-card');
        document.getElementById('spotlight-overlay').style.clipPath = `polygon(0% 0%, 0% 100%, ${rect.left-10}px 100%, ${rect.left-10}px ${rect.top-10}px, ${rect.right+10}px ${rect.top-10}px, ${rect.right+10}px ${rect.bottom+10}px, ${rect.left-10}px ${rect.bottom+10}px, ${rect.left-10}px 100%, 100% 100%, 100% 0%)`;
        document.getElementById('tour-title').innerText = step.title;
        document.getElementById('tour-desc').innerText = step.desc;
        card.style.top = `${rect.bottom + 20}px`;
        card.style.left = `${Math.max(20, Math.min(rect.left, window.innerWidth - 360))}px`;
        document.getElementById('tour-next-btn').innerText = (state.tourStep === tourSteps.length - 1) ? 'Fine' : 'Avanti';
      }, 300);
    }

    // --- Prezzi ---
    function getPriceStatus(val) { return val < 100 ? 'status-good' : val < 150 ? 'status-medium' : 'status-high'; }
    function renderPrezzi() {
      const tbody = document.getElementById('prezziBody');
      const sede = document.getElementById('partnerSelect').value;
      tbody.innerHTML = '';
      state.prezziData.forEach((row, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${sede}</td><td style="font-weight:600">${row.medico}</td><td>${row.idPrest}</td><td>${row.prestAz}</td><td style="color:var(--muted)">${row.prestCup}</td><td style="text-align:right"><div class="price-input-container"><input type="number" class="price-edit-field ${getPriceStatus(row.prezzo)}" value="${row.prezzo}"> <span>€</span></div></td>`;
        tbody.appendChild(tr);
      });
    }

    // --- Calendario ---
    function getStatusLabel(dStr, dateObj) {
      const isWk = isWeekend(dateObj);
      const isManualClosed = state.closedDays.has(dStr);
      if (isManualClosed || isWk) return "🔴 Giorno Chiuso";
      return "🟢 Giorno Aperto";
    }

    function renderCalendar() {
      const cal = document.getElementById('calendar'); cal.innerHTML = '';
      const months = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
      const header = document.createElement('div'); header.className = 'cal-header';
      header.innerHTML = '<div>Mese</div>' + Array.from({length:31}, (_,i) => `<div>${i+1}</div>`).join('');
      cal.appendChild(header);

      months.forEach((m, mi) => {
        const row = document.createElement('div'); row.className = 'cal-row';
        row.innerHTML = `<div class="month">${m}</div>`;
        for (let d = 1; d <= 31; d++) {
          const dStr = `2026-${String(mi+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const dateObj = new Date(2026, mi, d);
          const dayCell = document.createElement('div');

          if (dateObj.getMonth() !== mi) {
            dayCell.className = 'day empty';
          } else {
            const isWk = isWeekend(dateObj);
            const isManualClosed = state.closedDays.has(dStr);
            const isSelected = state.selectedDays.has(dStr);
            
            let typeClass = '';
            if (isManualClosed) typeClass = 'closed';
            else if (isWk) typeClass = 'weekend-closed';
            
            dayCell.className = `day ${typeClass} ${isSelected?'selected':''}`;
            dayCell.innerText = d;

            const tooltip = document.createElement('div');
            tooltip.className = 'day-tooltip';
            tooltip.innerText = getStatusLabel(dStr, dateObj) + (isSelected ? " | ✅ Selezionato" : "");
            dayCell.appendChild(tooltip);

            dayCell.onclick = () => {
              if (state.selectedDays.has(dStr)) state.selectedDays.delete(dStr);
              else state.selectedDays.add(dStr);
              document.getElementById('selectionSummary').innerText = `${state.selectedDays.size} selezionati`;
              renderCalendar();
            };
          }
          row.appendChild(dayCell);
        }
        cal.appendChild(row);
      });
    }

    function saveChiusure() {
      state.selectedDays.forEach(d => {
        if (state.closedDays.has(d)) state.closedDays.delete(d);
        else state.closedDays.add(d);
      });
      state.selectedDays.clear();
      renderCalendar();
      showToast("Modifiche salvate correttamente");
    }

    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
    window.onload = () => { renderPrezzi(); renderCalendar(); };
  </script>
